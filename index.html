<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment Reminder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-top: #fef6e7;
      --bg-bottom: #f3e0d2;
      --card: rgba(255, 251, 247, 0.94);
      --card-border: rgba(148, 93, 56, 0.16);
      --text-main: #3f2619;
      --text-soft: #856756;
      --field-bg: #fffdfa;
      --field-border: #dbc2b1;
      --field-focus: #ba6c3f;
      --accent: #b65a34;
      --accent-2: #2d6f86;
      --accent-3: #2d7a5b;
      --accent-muted: #8b847d;
      --preview-bg: #fff5ed;
      --preview-border: #d89c6e;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.75), transparent 32%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 14px;
    }

    .container {
      position: relative;
      overflow: hidden;
      background: var(--card);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 26px 60px rgba(94, 58, 37, 0.18);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 120px;
      background: linear-gradient(135deg, rgba(239, 180, 132, 0.35), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(182, 90, 52, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h2 {
      margin: 14px 0 8px;
      color: var(--text-main);
      font-size: 32px;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      display: block;
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 0.01em;
      color: var(--text-main);
    }

    input, textarea {
      width: 100%;
      padding: 13px 14px;
      margin-top: 6px;
      border-radius: 14px;
      border: 1px solid var(--field-border);
      font-size: 16px;
      background: var(--field-bg);
      color: var(--text-main);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--field-focus);
      box-shadow: 0 0 0 4px rgba(182, 90, 52, 0.12);
      transform: translateY(-1px);
    }

    textarea {
      resize: vertical;
      min-height: 108px;
    }

    .required { background-color: #fff9eb; }

    #preview {
      border: 2px solid var(--preview-border);
      background-color: var(--preview-bg);
      white-space: pre-line;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      width: 100%;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(40, 32, 28, 0.14);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: linear-gradient(135deg, #c8653c, #a94a28);
    }

    .secondary {
      background: linear-gradient(135deg, #3f85a4, #2d6885);
    }

    .tertiary {
      background: linear-gradient(135deg, #3e8c67, #2b6d4d);
    }

    .ghost {
      background: linear-gradient(135deg, #9a938d, #7d7771);
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .container {
        padding: 22px;
        border-radius: 22px;
      }

      h2 {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .full {
        grid-column: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">

<div class="eyebrow">Client Outreach</div>
<h2>Send Reminder</h2>
<p class="subtitle">Build a polished reminder, then send it by email or text in the way that fits best.</p>

<div class="grid">
  <div class="full">
    <label>Client Phone Number</label>
    <input id="phone" class="required" placeholder="Enter client's phone number">
  </div>

  <div class="full">
    <label>Client Email</label>
    <input id="email" class="required" placeholder="Enter client's email">
  </div>

  <div class="full">
    <label>Client Name</label>
    <input id="name" placeholder="Enter client's name">
  </div>

  <div class="full">
    <label>Service Address</label>
    <input id="address" placeholder="Enter service address">
  </div>

  <div>
    <label>Date of Service</label>
    <input type="date" id="date">
  </div>

  <div>
    <label>Time of Service</label>
    <input type="time" id="time">
  </div>

  <div class="full">
    <label>Notes (optional)</label>
    <textarea id="notes"></textarea>
  </div>

  <div class="full">
    <label>Message Preview (Editable)</label>
    <textarea id="preview"></textarea>
  </div>
</div>

<div class="actions">
  <button class="primary" onclick="sendBrevoEmail()">Send Email via Brevo</button>
  <button class="secondary" onclick="sendLocalEmail()">Send Email from This Device</button>
  <button class="tertiary" onclick="sendLocalText()">Send Text from This Device</button>
  <button class="ghost" onclick="sendTwilioText()">Send Text via Twilio</button>
</div>

<p class="hint">
  Local email and text options will open your default app with the message filled in as much as your device allows.
</p>

</div>

<script src="app.js"></script>

</body>
</html>
