<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Appointment Reminder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-top: #10141c;
      --bg-bottom: #1a2230;
      --card: rgba(246, 248, 252, 0.96);
      --card-border: rgba(95, 118, 148, 0.22);
      --text-main: #111827;
      --text-soft: #5b6472;
      --field-bg: #ffffff;
      --field-border: #cbd5e1;
      --field-focus: #2563eb;
      --accent: #2563eb;
      --accent-2: #3b82f6;
      --accent-3: #1d4ed8;
      --accent-muted: #6b7280;
      --preview-bg: #eef4ff;
      --preview-border: #8ab4ff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.22), transparent 32%),
        radial-gradient(circle at right, rgba(148,163,184,0.18), transparent 28%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 28px 14px;
    }

    .container {
      position: relative;
      overflow: hidden;
      background: var(--card);
      width: 100%;
      max-width: 520px;
      padding: 28px;
      border-radius: 28px;
      box-shadow: 0 26px 60px rgba(94, 58, 37, 0.18);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 110px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    h2 {
      margin: 4px 0 8px;
      color: var(--text-main);
      font-size: 34px;
      line-height: 1.05;
    }

    .section-title {
      margin: 0 0 8px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      display: block;
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 0.01em;
      color: var(--text-main);
    }

    input, textarea {
      width: 100%;
      padding: 13px 14px;
      margin-top: 6px;
      border-radius: 14px;
      border: 1px solid var(--field-border);
      font-size: 16px;
      background: var(--field-bg);
      color: var(--text-main);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    input[type="date"],
    input[type="time"] {
      min-height: 50px;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus {
      border-color: var(--field-focus);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    textarea {
      resize: vertical;
      min-height: 108px;
    }

    .required { background-color: #f8fbff; }

    #preview {
      border: 2px solid var(--preview-border);
      background-color: var(--preview-bg);
      white-space: pre-line;
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    button {
      width: 100%;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 16px;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(40, 32, 28, 0.14);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    .secondary {
      background: linear-gradient(135deg, #334155, #1f2937);
    }

    .tertiary {
      background: linear-gradient(135deg, #475569, #334155);
    }

    .ghost {
      background: linear-gradient(135deg, #94a3b8, #64748b);
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .container {
        padding: 22px;
        border-radius: 22px;
      }

      h2 {
        font-size: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .full {
        grid-column: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">

<h2>Appointment Reminder</h2>
<p class="section-title">Client Details</p>

<div class="grid">
  <div class="full">
    <label>Client Phone Number (required)</label>
    <input id="phone" class="required" placeholder="Enter client's phone number">
  </div>

  <div class="full">
    <label>Client Email (optional)</label>
    <input id="email" placeholder="Enter client's email">
  </div>

  <div class="full">
    <label>Client Name (optional)</label>
    <input id="name" placeholder="Enter client's name">
  </div>

  <div class="full">
    <label>Service Address (optional)</label>
    <input id="address" placeholder="Enter service address">
  </div>

  <div>
    <label>Date of Service (optional)</label>
    <input type="date" id="date">
  </div>

  <div>
    <label>Time of Service (optional)</label>
    <input type="time" id="time">
  </div>

  <div class="full">
    <label>Notes (optional)</label>
    <textarea id="notes"></textarea>
  </div>

  <div class="full">
    <label>Message Preview (Editable)</label>
    <textarea id="preview"></textarea>
  </div>
</div>

<div class="actions">
  <button class="primary" onclick="sendBrevoEmail()">Send Reminder Email</button>
  <button class="secondary" onclick="sendLocalEmail()">Send Email From This Device</button>
  <button class="tertiary" onclick="sendLocalText()">Send Text From This Device</button>
  <button class="ghost" onclick="sendTwilioText()">Send Text Automatically</button>
</div>

<p class="hint">
  Only the phone number is required. Everything else is optional and can be added when needed.
</p>

</div>

<script src="app.js"></script>

</body>
</html>
