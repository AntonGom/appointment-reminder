<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In</title>
  <link rel="stylesheet" href="nav.css?v=20260331c">
  <style>
    :root {
      --bg-top: #0f172a;
      --bg-bottom: #18243f;
      --card: rgba(248, 250, 252, 0.96);
      --card-border: rgba(148, 163, 184, 0.22);
      --text-main: #10213d;
      --text-soft: #5a6b86;
      --accent: #2563eb;
      --accent-deep: #1d4ed8;
      --field-border: #cbd5e1;
      --success: #166534;
      --success-bg: #dcfce7;
      --error: #b91c1c;
      --error-bg: #fee2e2;
      --info: #1d4ed8;
      --info-bg: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sans, "Segoe UI", sans-serif);
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 30%),
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.18), transparent 24%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: #e2e8f0;
      padding: 90px 16px 34px;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .hero,
    .panel {
      position: relative;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 30px;
      box-shadow: 0 20px 42px rgba(15, 23, 42, 0.18);
      color: var(--text-main);
    }

    .hero::before,
    .panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 120px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.14), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .hero-content,
    .panel-content {
      position: relative;
      z-index: 1;
      padding: 30px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.12);
      color: #1d4ed8;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 12px;
      font-family: var(--font-display, Georgia, serif);
      font-size: clamp(34px, 5vw, 52px);
      line-height: 0.93;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text-main);
    }

    .lead,
    .panel-copy,
    .mini-link {
      color: var(--text-soft);
      font-size: 16px;
      line-height: 1.75;
      margin: 0;
    }

    .status-banner,
    .notice {
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      font-weight: 700;
    }

    .status-banner.success { background: var(--success-bg); color: var(--success); }
    .status-banner.error { background: var(--error-bg); color: var(--error); }
    .status-banner.info,
    .notice { background: var(--info-bg); color: var(--info); }

    form {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-main);
      font-size: 15px;
      font-weight: 800;
    }

    input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid var(--field-border);
      background: #ffffff;
      color: var(--text-main);
      font-size: 18px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    button {
      width: 100%;
      min-height: 54px;
      padding: 0 18px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent-deep));
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 26px rgba(15, 23, 42, 0.14);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .mini-link {
      margin-top: 16px;
      text-align: center;
    }

    .mini-link a {
      color: var(--accent-deep);
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 760px) {
      body { padding: 88px 12px 30px; }
      .hero-content, .panel-content { padding: 22px; }
      .hero, .panel { border-radius: 24px; }
    }
  </style>
</head>
<body data-page="signin">
  <div class="page">
    <section class="hero">
      <div class="hero-content">
        <div class="eyebrow">Sign In</div>
        <h1>Welcome back.</h1>
        <p class="lead">Sign in to open your saved clients, calendar, and reminder history.</p>
      </div>
    </section>

    <div id="status-banner" class="status-banner" hidden></div>
    <div id="auth-setup-notice" class="notice" hidden>Accounts are not configured yet. Add your Supabase public keys in Vercel first.</div>

    <section class="panel">
      <div class="panel-content">
        <h2>Sign in</h2>
        <p class="panel-copy">Use the same email and password you created for your account.</p>
        <form id="sign-in-form">
          <div>
            <label for="sign-in-email">Email</label>
            <input id="sign-in-email" name="email" type="email" inputmode="email" autocomplete="email" required>
          </div>
          <div>
            <label for="sign-in-password">Password</label>
            <input id="sign-in-password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button type="submit">Sign In</button>
        </form>
        <div class="mini-link">Need an account first? <a href="account.html">Create one here</a></div>
      </div>
    </section>
  </div>

  <script src="nav.js?v=20260331c"></script>
  <script type="module" src="auth.js?v=20260331a"></script>
</body>
</html>
